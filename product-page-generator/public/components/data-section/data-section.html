<div class="data-section" id="sectionHighlights">
    <div class="data-section-header" onclick="app.toggleSection('Highlights')">
        <span>📍 核心卖点</span>
        <span class="toggle-icon">▼</span>
    </div>
    <div class="data-section-body">
        <div id="listHighlights" class="data-list"></div>
        <div class="data-add-form" id="formHighlights">
            <input type="text" id="addHighlightKey" placeholder="属性名称">
            <input type="text" id="addHighlightValue" placeholder="属性值">
            <button type="button" class="btn btn-sm btn-success" onclick="app.addDataItem('highlights')">添加</button>
            <button type="button" class="btn btn-sm btn-secondary" onclick="app.hideAddForm('Highlights')">取消</button>
        </div>
        <button type="button" class="btn btn-sm btn-primary" style="width:auto;" onclick="app.showAddForm('Highlights')">+ 添加</button>
    </div>
</div>
