<div style="display:flex;gap:8px;margin-bottom:16px;">
    <button id="settingsSubTabSystem" class="btn btn-sm btn-primary" onclick="app.switchSettingsSubTab('system')">⚙️ 系统设置</button>
    <button id="settingsSubTabIcons" class="btn btn-sm btn-secondary" onclick="app.switchSettingsSubTab('icons')">🎨 图标管理</button>
</div>

<div id="settingsSystemSection">
    <div class="card">
        <div class="card-header">
            <h3>⚙️ 系统设置</h3>
        </div>

        <div class="form-group">
            <label>默认供应商</label>
            <select id="defaultProvider" onchange="app.onProviderChange()">
                <option value="ollama">Ollama (本地)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="zhipu">智谱AI</option>
            </select>
        </div>

        <div id="ollamaConfig" style="background: #f0fdf4; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #10b981;">
            <h5 style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 20px;">🖥️</span> Ollama 本地模型
            </h5>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-size: 13px; color: #64748b; display: block; margin-bottom: 5px;">服务地址</label>
                    <input type="text" id="ollamaBaseUrl" placeholder="http://localhost:11434/v1">
                </div>
                <div>
                    <label style="font-size: 13px; color: #64748b; display: block; margin-bottom: 5px;">模型名称</label>
                    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
                        <input type="checkbox" id="useCustomModel" onchange="app.toggleCustomModel()">
                        <label for="useCustomModel" style="font-size: 12px; color: #64748b; margin: 0; cursor: pointer;">使用自定义模型</label>
                    </div>
                    <select id="ollamaModelPreset">
                        <option value="gemma4:e4b">gemma4:e4b</option>
                        <option value="llama3">llama3</option>
                        <option value="llama2">llama2</option>
                        <option value="mistral">mistral</option>
                        <option value="qwen2">qwen2</option>
                        <option value="codellama">codellama</option>
                        <option value="phi3">phi3</option>
                    </select>
                    <input type="text" id="ollamaModelCustom" placeholder="输入自定义模型名称" style="display: none; margin-top: 8px;">
                </div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="testProvider('ollama')" style="margin-top: 15px;">🔌 测试连接</button>
            <span id="ollamaStatus" style="margin-left: 10px; font-size: 13px;"></span>
        </div>

        <div id="deepseekConfig" class="hidden" style="background: #fef3c7; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #f59e0b;">
            <h5 style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 20px;">🧠</span> DeepSeek
            </h5>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-size: 13px; color: #64748b; display: block; margin-bottom: 5px;">API Key</label>
                    <input type="password" id="deepseekApiKey" placeholder="sk-...">
                </div>
                <div>
                    <label style="font-size: 13px; color: #64748b; display: block; margin-bottom: 5px;">模型</label>
                    <select id="deepseekModel">
                        <option value="deepseek-chat">deepseek-chat</option>
                        <option value="deepseek-coder">deepseek-coder</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="testProvider('deepseek')" style="margin-top: 15px;">🔌 测试连接</button>
            <span id="deepseekStatus" style="margin-left: 10px; font-size: 13px;"></span>
        </div>

        <div id="zhipuConfig" class="hidden" style="background: #ede9fe; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #8b5cf6;">
            <h5 style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 20px;">✨</span> 智谱AI
            </h5>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-size: 13px; color: #64748b; display: block; margin-bottom: 5px;">API Key</label>
                    <input type="password" id="zhipuApiKey" placeholder="...">
                </div>
                <div>
                    <label style="font-size: 13px; color: #64748b; display: block; margin-bottom: 5px;">模型</label>
                    <select id="zhipuModel">
                        <option value="glm-4-flash">glm-4-flash</option>
                        <option value="glm-4">glm-4</option>
                        <option value="glm-3-turbo">glm-3-turbo</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="testProvider('zhipu')" style="margin-top: 15px;">🔌 测试连接</button>
            <span id="zhipuStatus" style="margin-left: 10px; font-size: 13px;"></span>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <div class="form-group">
                <label>最大迭代次数</label>
                <input type="number" id="maxIterations" value="10">
            </div>
            <div class="form-group">
                <label>最大Token数</label>
                <input type="number" id="maxTokens" value="4000">
            </div>
        </div>

        <button class="btn btn-primary" onclick="saveSettings()" style="margin-top: 20px;">💾 保存设置</button>
    </div>
</div>

<div id="settingsIconsSection" class="hidden">
    <div class="card">
        <div class="card-header">
            <h3>🎨 图标素材管理</h3>
            <div style="display:flex;gap:8px;align-items:center;">
                <input type="text" id="iconSearchInput" placeholder="搜索图标..." style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:4px;font-size:13px;" oninput="app.searchIcons(this.value)">
                <select id="iconCategoryFilter" onchange="app.filterIconsByCategory(this.value)" style="padding:6px 12px;border:1px solid #e5e7eb;border-radius:4px;font-size:13px;">
                    <option value="">全部分类</option>
                </select>
            </div>
        </div>

        <div id="iconCategoryInfo" style="background:#eff6ff;padding:12px 16px;border-radius:6px;margin-bottom:16px;display:none;border-left:4px solid #3b82f6;">
            <strong id="iconCategoryName" style="color:#1d4ed8;"></strong>
            <span id="iconCategoryDesc" style="font-size:13px;color:#64748b;margin-left:8px;"></span>
        </div>

        <div id="iconsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">
            <div style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px;">加载中...</div>
        </div>

        <div id="iconDetailPanel" style="display:none;margin-top:20px;padding:20px;background:#f8f9fa;border-radius:8px;border:1px solid #e5e7eb;">
            <div style="display:flex;gap:24px;align-items:flex-start;">
                <div id="iconPreviewLarge" style="width:120px;height:120px;background:#fff;border:2px solid #e5e7eb;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"></div>
                <div style="flex:1;">
                    <h4 id="iconDetailName" style="font-size:20px;margin-bottom:4px;"></h4>
                    <p id="iconDetailNameEn" style="font-size:14px;color:#64748b;margin-bottom:12px;"></p>
                    <p id="iconDetailDesc" style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:12px;"></p>
                    <div style="margin-bottom:12px;">
                        <label style="font-size:12px;color:#64748b;">标签：</label>
                        <div id="iconDetailTags" style="display:inline-flex;gap:6px;flex-wrap:wrap;"></div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-sm btn-secondary" onclick="app.copyIconCode()">📋 复制引用代码</button>
                        <button class="btn btn-sm btn-primary" onclick="app.useIconInTemplate()">📄 用于模板</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top:16px;">
        <div class="card-header">
            <h3>📖 使用说明</h3>
        </div>
        <div style="padding:16px;font-size:14px;color:#4b5563;line-height:1.8;">
            <p><strong>图标引用方式：</strong></p>
            <pre style="background:#1e293b;color:#e2e8f0;padding:12px;border-radius:6px;font-size:13px;overflow-x:auto;margin-top:8px;">// 模板中使用
{{icon:bike-repair-stand:rotate-360}}

// API获取
GET /api/icons/rotate-360

// 直接访问SVG
/assets/icons/svgs/rotate-360.svg</pre>
            <p style="margin-top:12px;"><strong>分类说明：</strong>每个分类包含推荐图标列表，按优先级排序。产品详情页生成时可根据产品类别自动匹配最佳图标组合。</p>
        </div>
    </div>
</div>
