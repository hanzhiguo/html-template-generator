<button class="ai-float-btn" id="aiFloatBtn">🤖</button>

<div class="ai-chat-window" id="aiChatWindow">
    <div class="ai-chat-header" id="aiChatHeader">
        <h3>🤖 AI助手</h3>
        <span id="aiProviderInfo" style="font-size:12px;color:#94a3b8;">加载中...</span>
        <button class="ai-chat-close" id="aiChatClose">×</button>
    </div>
    <div class="ai-chat-messages" id="agentMessages"></div>
    <div class="ai-chat-input-area">
        <textarea id="agentInput" rows="3" placeholder="输入消息..."></textarea>
        <button class="ai-send-btn" id="aiSendBtn">发送</button>
    </div>
    <div class="ai-resize-handle" id="aiResizeHandle"></div>
</div>
