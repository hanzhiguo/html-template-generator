<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>主题演示 - 极简三色系统</title>

    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/themes-light-dark.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">

    <style>
        .demo-container {
            max-width: 960px;
            margin: 0 auto;
            padding: var(--space-8);
        }

        .demo-header {
            text-align: center;
            margin-bottom: var(--space-8);
            padding-top: var(--space-8);
        }

        .demo-title {
            font-size: var(--text-3xl);
            font-weight: var(--font-bold);
            color: var(--text-primary);
            margin-bottom: var(--space-3);
        }

        .demo-subtitle {
            font-size: var(--text-lg);
            color: var(--text-secondary);
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-6);
            margin-bottom: var(--space-8);
        }

        .color-swatch {
            padding: var(--space-4);
            border-radius: var(--radius-md);
            text-align: center;
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
        }

        .color-swatch-label {
            margin-bottom: var(--space-2);
            opacity: 0.85;
        }

        .color-swatch-value {
            font-family: var(--font-mono);
            opacity: 0.65;
            font-size: var(--text-xs);
        }

        .ratio-badge {
            display: inline-block;
            background: var(--accent-light);
            color: var(--accent);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: var(--font-medium);
        }
    </style>
</head>
<body>

    <div class="demo-container">

        <div class="demo-header">
            <h1 class="demo-title">极简三色系统</h1>
            <p class="demo-subtitle">
                白色 <span class="ratio-badge">50%</span>
                灰色 <span class="ratio-badge">35%</span>
                蓝色 <span class="ratio-badge">15%</span>
            </p>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>配色方案</h3>
            </div>
            <div class="demo-grid">
                <div class="color-swatch" style="background: var(--color-white); color: var(--color-gray-900); border: 1px solid var(--border-light);">
                    <div class="color-swatch-label">白色 50%</div>
                    <div class="color-swatch-value">#ffffff</div>
                </div>
                <div class="color-swatch" style="background: var(--color-gray-100); color: var(--color-gray-900); border: 1px solid var(--border-light);">
                    <div class="color-swatch-label">浅灰背景</div>
                    <div class="color-swatch-value">#f3f4f6</div>
                </div>
                <div class="color-swatch" style="background: var(--color-gray-500); color: #fff;">
                    <div class="color-swatch-label">灰色 35%</div>
                    <div class="color-swatch-value">#6b7280</div>
                </div>
                <div class="color-swatch" style="background: var(--color-gray-900); color: #fff;">
                    <div class="color-swatch-label">深灰文字</div>
                    <div class="color-swatch-value">#111827</div>
                </div>
                <div class="color-swatch" style="background: var(--accent); color: #fff;">
                    <div class="color-swatch-label">蓝色 15%</div>
                    <div class="color-swatch-value">#2563eb</div>
                </div>
                <div class="color-swatch" style="background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-soft);">
                    <div class="color-swatch-label">浅蓝背景</div>
                    <div class="color-swatch-value">#eff6ff</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>按钮</h3>
            </div>
            <div style="display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: center;">
                <button class="btn btn-primary">主要按钮</button>
                <button class="btn btn-secondary">次要按钮</button>
                <button class="btn btn-success">成功</button>
                <button class="btn btn-danger">删除</button>
                <button class="btn btn-primary btn-sm">小按钮</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>表单</h3>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: var(--space-4);">
                <div class="form-group">
                    <label>文本输入</label>
                    <input type="text" placeholder="请输入内容">
                </div>
                <div class="form-group">
                    <label>下拉选择</label>
                    <select>
                        <option>请选择</option>
                        <option>选项A</option>
                        <option>选项B</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>文本域</label>
                    <textarea placeholder="请输入描述"></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>标签页</h3>
            </div>
            <div class="tabs">
                <button class="tab active">全部</button>
                <button class="tab">草稿</button>
                <button class="tab">已发布</button>
                <button class="tab">已归档</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>状态徽章</h3>
            </div>
            <div style="display: flex; gap: var(--space-3); flex-wrap: wrap;">
                <span class="status-badge status-active">已发布</span>
                <span class="status-badge status-draft">草稿</span>
                <span class="status-badge status-archived">已归档</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>表格</h3>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>极简三色系统</td>
                        <td><span class="status-badge status-active">已发布</span></td>
                        <td class="actions">
                            <button class="view">查看</button>
                            <button>编辑</button>
                        </td>
                    </tr>
                    <tr>
                        <td>主题切换</td>
                        <td><span class="status-badge status-draft">草稿</span></td>
                        <td class="actions">
                            <button class="view">查看</button>
                            <button>编辑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card" style="text-align: center;">
            <p style="color: var(--text-secondary); font-size: var(--text-sm);">
                点击右上角按钮切换浅色/深色主题
            </p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { themeManager, toggleTheme } from './js/services/themeManager.js';

        window.toggleTheme = toggleTheme;

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                this.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
