<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置页面测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-body {
            padding: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>设置页面测试</h1>

    <div class="card">
        <div class="card-header">
            <h2>⚙️ 系统设置</h2>
            <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
        </div>
        <div class="card-body">
            <div>
                <label>默认供应商</label>
                <select id="defaultProvider" onchange="onProviderChange()">
                    <option value="ollama">Ollama (本地模型)</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="zhipu">智谱 GLM</option>
                </select>
            </div>

            <div id="ollamaConfig">
                <h3>Ollama 配置</h3>
                <label>服务地址</label>
                <input type="text" id="ollamaBaseUrl" value="http://localhost:11434/v1">
                <label>模型</label>
                <select id="ollamaModel">
                    <option value="llama3">llama3</option>
                    <option value="llama2">llama2</option>
                </select>
                <button class="btn btn-secondary" onclick="testProvider('ollama')">测试连接</button>
                <span id="ollamaStatus"></span>
            </div>

            <div id="deepseekConfig" style="display: none;">
                <h3>DeepSeek 配置</h3>
                <label>API Key</label>
                <input type="password" id="deepseekApiKey">
                <label>模型</label>
                <select id="deepseekModel">
                    <option value="deepseek-chat">deepseek-chat</option>
                    <option value="deepseek-coder">deepseek-coder</option>
                </select>
                <button class="btn btn-secondary" onclick="testProvider('deepseek')">测试连接</button>
                <span id="deepseekStatus"></span>
            </div>

            <div id="zhipuConfig" style="display: none;">
                <h3>智谱 GLM 配置</h3>
                <label>API Key</label>
                <input type="password" id="zhipuApiKey">
                <label>模型</label>
                <select id="zhipuModel">
                    <option value="glm-4-flash">GLM-4-Flash</option>
                    <option value="glm-4">GLM-4</option>
                </select>
                <button class="btn btn-secondary" onclick="testProvider('zhipu')">测试连接</button>
                <span id="zhipuStatus"></span>
            </div>
        </div>
    </div>

    <div class="status" id="status">加载中...</div>

    <script>
        const token = localStorage.getItem('token');

        if (!token) {
            document.getElementById('status').textContent = '错误: 未登录，请先登录系统';
        }

        function onProviderChange() {
            const provider = document.getElementById('defaultProvider').value;
            document.getElementById('ollamaConfig').style.display = provider === 'ollama' ? 'block' : 'none';
            document.getElementById('deepseekConfig').style.display = provider === 'deepseek' ? 'block' : 'none';
            document.getElementById('zhipuConfig').style.display = provider === 'zhipu' ? 'block' : 'none';
        }

        async function loadSettings() {
            try {
                const response = await fetch(`${window.location.origin}/api/settings/config`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const config = await response.json();
                document.getElementById('status').textContent = '配置加载成功:\n' + JSON.stringify(config, null, 2);

                if (config.defaultProvider) {
                    document.getElementById('defaultProvider').value = config.defaultProvider;
                    onProviderChange();
                }

                if (config.providers && config.providers.ollama) {
                    document.getElementById('ollamaBaseUrl').value = config.providers.ollama.baseUrl || '';
                    document.getElementById('ollamaModel').value = config.providers.ollama.model || 'llama3';
                }

            } catch (error) {
                document.getElementById('status').textContent = '加载失败: ' + error.message;
            }
        }

        async function saveSettings() {
            try {
                const settings = {
                    defaultProvider: document.getElementById('defaultProvider').value,
                    providers: {
                        ollama: {
                            baseUrl: document.getElementById('ollamaBaseUrl').value,
                            model: document.getElementById('ollamaModel').value
                        }
                    }
                };

                const response = await fetch(`${window.location.origin}/api/settings/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(settings)
                });

                const result = await response.json();
                document.getElementById('status').textContent = '保存结果:\n' + JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('status').textContent = '保存失败: ' + error.message;
            }
        }

        async function testProvider(provider) {
            const statusSpan = document.getElementById(provider + 'Status');
            statusSpan.textContent = '测试中...';

            try {
                const response = await fetch(`${window.location.origin}/api/settings/test-provider`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ provider })
                });

                const result = await response.json();
                statusSpan.textContent = result.message || JSON.stringify(result);
            } catch (error) {
                statusSpan.textContent = '测试失败: ' + error.message;
            }
        }

        // 页面加载时获取配置
        loadSettings();
    </script>
</body>
</html>
