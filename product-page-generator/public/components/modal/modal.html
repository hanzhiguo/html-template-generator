<div class="modal-overlay" id="productModal">
    <div class="modal" style="max-width:800px;">
        <div class="modal-header">
            <h3 id="modalTitle">新增产品</h3>
            <button class="modal-close" onclick="document.getElementById('productModal').classList.remove('active')">×</button>
        </div>
        <form id="productForm">
            <input type="hidden" id="productId">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group">
                    <label>SKU编号</label>
                    <input type="text" id="productSku" placeholder="可选">
                </div>
                <div class="form-group">
                    <label>产品名称 *</label>
                    <input type="text" id="productName" placeholder="必填" required>
                </div>
                <div class="form-group">
                    <label>副标题</label>
                    <input type="text" id="productSubtitle" placeholder="简短描述">
                </div>
                <div class="form-group">
                    <label>价格</label>
                    <input type="number" id="productPrice" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>货币</label>
                    <select id="productCurrency">
                        <option value="USD">USD</option>
                        <option value="CNY">CNY</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="productStatus">
                        <option value="draft">草稿</option>
                        <option value="active">已发布</option>
                    </select>
                </div>
            </div>

            <div style="margin-top:24px;border-top:1px solid #e5e7eb;padding-top:20px;">
                <h4 style="margin-bottom:16px;color:#1e40af;">产品数据</h4>
                <div id="productDataSections"></div>
            </div>

            <div style="display:flex;gap:12px;margin-top:24px;">
                <button type="submit" class="btn btn-primary" style="flex:1;">保存</button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('productModal').classList.remove('active')">取消</button>
            </div>
        </form>
    </div>
</div>
