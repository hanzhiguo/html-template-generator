<button class="ai-float-btn" id="aiFloatBtn">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
</button>

<div class="ai-chat-window" id="aiChatWindow">
  <div class="ai-chat-header" id="aiChatHeader">
    <div class="ai-chat-header-info">
      <h3>AI 助手</h3>
      <span id="aiProviderInfo" class="ai-provider-info">加载中...</span>
    </div>
    <div class="ai-chat-header-actions">
      <button class="ai-chat-new-btn" id="aiNewChatBtn">新对话</button>
      <button class="ai-chat-close" id="aiChatClose">×</button>
    </div>
  </div>
  <div class="ai-chat-messages" id="agentMessages"></div>
  <div class="ai-chat-input-area">
    <textarea id="agentInput" rows="1" placeholder="输入消息... (Shift+Enter换行)"></textarea>
    <button class="ai-send-btn" id="aiSendBtn">发送</button>
  </div>
  <div class="ai-resize-handle" id="aiResizeHandle"></div>
</div>
